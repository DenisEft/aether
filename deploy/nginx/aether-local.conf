# Aether — Local Test Config (Port-based, no domain, static frontend)
# Place at: /etc/nginx/sites-available/aether-local.conf

upstream aether_backend {
    server 127.0.0.1:8799;
}

server {
    listen 8798;  # Main entry point — use this in browser

    root /var/www/aether;
    index index.html;

    client_max_body_size 20M;

    # Backend API
    location /api/ {
        proxy_pass http://aether_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://aether_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Widget static files
    location /widget/ {
        alias /var/www/aether/widget/;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # Frontend SPA — fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
