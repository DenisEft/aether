# Aether — CI/CD Pipeline
# Runs on every push and pull request to main.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: Lint ──────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-ruff@v3
      - run: ruff check app/ --config pyproject.toml
      - run: ruff format app/ --check --config pyproject.toml

  # ── Backend: Tests ─────────────────────────────────────────
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aether
          POSTGRES_PASSWORD: aether_test
          POSTGRES_DB: aether_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      AETHER_DATABASE_URL: postgresql+asyncpg://aether:aether_test@localhost:5432/aether_test
      AETHER_REDIS_URL: redis://localhost:6379/0
      AETHER_JWT_SECRET_KEY: ci-test-secret-key-for-testing-only
      AETHER_ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/ -v --tb=short
